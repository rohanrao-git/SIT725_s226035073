<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Clap Counter</title>
  </head>
  <body>
    <h1>Live Clap Counter</h1>
    <p>Online users: <strong id="onlineUsers">0</strong></p>
    <p>Total claps: <strong id="totalClaps">0</strong></p>
    <p>Last action: <span id="lastAction">Waiting for activity...</span></p>
    <button id="clapBtn">Add Clap</button>

    <!-- Load socket.io BEFORE scripts.js -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
